<!DOCTYPE html><html lang="fr-CA"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Foin Tracker</title><meta name="apple-mobile-web-app-capable" content="yes"><style>
:root{--bg:#eef5ea;--card:#fff;--text:#0b2414;--muted:#657366;--green:#17843b;--red:#ba2b2b;--border:#d9e3d5}
body.dark{--bg:#07130b;--card:#102217;--text:#f0f7ef;--muted:#b7c6b8;--border:#294733}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif}.app{max-width:760px;margin:auto;padding:16px}
header{display:flex;justify-content:space-between;align-items:center;background:#0b3a1e;color:white;border-radius:20px;padding:18px;margin-bottom:14px}
h1{font-size:34px;margin:0}#themeBtn{font-size:30px;border:0;border-radius:16px;padding:14px 18px;background:white;color:#12351f}.date{font-weight:700;margin:8px 2px 14px;color:var(--muted)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card,.panel{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:18px;margin-bottom:14px}
.card span{display:block;color:var(--muted);font-size:19px}.card b{font-size:46px}.active{text-align:center;border:3px solid var(--green)}.active b{display:block;font-size:58px}.hidden{display:none!important}
.main{width:100%;border:0;border-radius:24px;padding:34px 8px;margin:10px 0 16px;color:white;font-size:42px;font-weight:900}.start{background:var(--green)}.arrive{background:var(--red)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.grid button{border:0;border-radius:18px;padding:22px 0;font-size:30px;font-weight:900;background:var(--green);color:white}
button.secondary,.actions button{width:100%;border:1px solid var(--border);background:var(--card);color:var(--text);border-radius:18px;padding:18px;font-size:22px;margin-top:10px}
h2{font-size:28px;margin:4px 0 16px}.item{border-bottom:1px solid var(--border);padding:13px 0}.item b{font-size:22px}.item small{display:block;color:var(--muted);font-size:17px;margin-top:4px}.empty{text-align:center;color:var(--muted);padding:18px}
</style></head><body><main class="app">
<header><h1>🚜 Foin Tracker</h1><button id="themeBtn">🌙</button></header><div class="date" id="dateLabel"></div>
<section class="stats"><div class="card"><span>Voyages</span><b id="tripCount">0</b></div><div class="card"><span>Balles</span><b id="baleTotal">0</b></div><div class="card"><span>Moyenne</span><b id="avgTime">0 min</b></div><div class="card"><span>Temps total</span><b id="totalTime">0 min</b></div></section>
<section id="activeTrip" class="panel active hidden"><p>Voyage en cours</p><b id="elapsed">00:00</b><small id="startedAt"></small></section>
<button id="mainBtn" class="main start">🚜 DÉPART</button>
<section id="balePicker" class="panel hidden"><h2>Combien de balles?</h2><div id="baleGrid" class="grid"></div><button id="cancelArrival" class="secondary">Annuler</button></section>
<section class="panel actions"><button id="undoBtn">↩️ Annuler dernier voyage</button><button id="newDayBtn">🗑️ Nouvelle journée</button><button id="exportBtn">📤 Export CSV</button></section>
<section class="panel"><h2>Historique du jour</h2><div id="historyList"></div></section></main>
<script>
const $=id=>document.getElementById(id),todayKey=()=>new Date().toISOString().slice(0,10);let state=JSON.parse(localStorage.getItem("foinTrackerSolo")||"{}");if(!state.days)state.days={};if(!state.current)state.current=null;if(!state.theme)state.theme="light";
function trips(){let k=todayKey();if(!state.days[k])state.days[k]=[];return state.days[k]}function save(){localStorage.setItem("foinTrackerSolo",JSON.stringify(state))}function time(x){return new Date(x).toLocaleTimeString("fr-CA",{hour:"2-digit",minute:"2-digit"})}function dur(ms){let m=Math.round(ms/60000);return m<60?m+" min":Math.floor(m/60)+" h "+String(m%60).padStart(2,"0")}function vib(){if(navigator.vibrate)navigator.vibrate(80)}
function render(){document.body.className=state.theme==="dark"?"dark":"";dateLabel.textContent=new Date().toLocaleDateString("fr-CA",{weekday:"long",day:"numeric",month:"long",year:"numeric"});let list=trips(),tb=list.reduce((s,t)=>s+t.bales,0),tm=list.reduce((s,t)=>s+(t.end-t.start),0);tripCount.textContent=list.length;baleTotal.textContent=tb;avgTime.textContent=list.length?dur(tm/list.length):"0 min";totalTime.textContent=tm?dur(tm):"0 min";mainBtn.textContent=state.current?"🏁 ARRIVÉE":"🚜 DÉPART";mainBtn.className=state.current?"main arrive":"main start";activeTrip.classList.toggle("hidden",!state.current);if(state.current)startedAt.textContent="Départ à "+time(state.current.start);historyList.innerHTML="";if(!list.length){historyList.innerHTML='<div class="empty">Aucun voyage enregistré aujourd’hui.</div>';return}[...list].reverse().forEach((t,i)=>{let n=list.length-i;historyList.innerHTML+=`<div class="item"><b>Voyage ${n} — ${t.bales} balles</b><small>${time(t.start)} → ${time(t.end)} • ${dur(t.end-t.start)}</small></div>`})}
function tick(){if(state.current){let sec=Math.floor((Date.now()-state.current.start)/1000);elapsed.textContent=String(Math.floor(sec/60)).padStart(2,"0")+":"+String(sec%60).padStart(2,"0")}}setInterval(tick,1000);
mainBtn.onclick=()=>{if(!state.current){state.current={start:Date.now()};save();vib();render();tick()}else{balePicker.classList.remove("hidden")}};cancelArrival.onclick=()=>balePicker.classList.add("hidden");
for(let i=1;i<=20;i++){let b=document.createElement("button");b.textContent=i;b.onclick=()=>{trips().push({start:state.current.start,end:Date.now(),bales:i});state.current=null;balePicker.classList.add("hidden");save();vib();render()};baleGrid.appendChild(b)}
undoBtn.onclick=()=>{let l=trips();if(!l.length)return alert("Aucun voyage à annuler.");if(confirm("Annuler le dernier voyage?")){l.pop();save();render()}};newDayBtn.onclick=()=>{if(confirm("Effacer les voyages d’aujourd’hui?")){state.days[todayKey()]=[];state.current=null;save();render()}};themeBtn.onclick=()=>{state.theme=state.theme==="dark"?"light":"dark";save();render()};
exportBtn.onclick=()=>{let rows=[["Date","Depart","Arrivee","Duree_minutes","Balles"]];trips().forEach(t=>rows.push([todayKey(),time(t.start),time(t.end),Math.round((t.end-t.start)/60000),t.bales]));let a=document.createElement("a");a.href=URL.createObjectURL(new Blob([rows.map(r=>r.join(",")).join("\n")],{type:"text/csv"}));a.download="foin-tracker-"+todayKey()+".csv";a.click()};render();tick();
</script></body></html>
